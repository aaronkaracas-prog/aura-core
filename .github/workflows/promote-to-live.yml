name: promote-to-live

# The deploy workflow AURA_PROMOTE fires. Installs the project's OWN declared toolchain (wrangler 4 from
# package.json) and runs the project's own deploy script - real wrangler deploy of main, carrying the full
# binding graph (KV, D1, Vectorize, AI, service bindings, Durable Objects WITH migrations, cron, email,
# browser). No version pinning to drift: uses exactly what package.json declares.

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ 'src/index.mjs', 'wrangler.toml' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Syntax gate (never deploy broken code)
        run: node --check src/index.mjs

      - name: Install project toolchain (wrangler 4 from package.json)
        run: npm ci

      - name: Deploy with the project's own wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Verify live build matches main
        run: |
          sleep 10
          MAIN=$(grep -m1 'const BUILD' src/index.mjs | grep -oE 'aura-core-v[0-9.]+-[0-9-]+')
          LIVE=$(curl -s https://aura-core-v2.aaronkaracas.workers.dev/health | grep -oE 'aura-core-v[0-9.]+-[0-9-]+' | head -1)
          echo "main=$MAIN live=$LIVE"
          if [ "$MAIN" != "$LIVE" ]; then echo "BUILD MISMATCH - deploy did not land"; exit 1; fi
          echo "VERIFIED: live matches main"
