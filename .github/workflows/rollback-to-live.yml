name: rollback-to-live

# THE EXTERNAL RECOVERY FLOOR. This lives OUTSIDE aura-core and runs on GitHub's servers, so it works
# even when aura-core is completely broken, stranded, or rolled back past its own ROLLBACK_SELF command.
# It redeploys a CHOSEN previous commit (or the previous commit by default) via real wrangler - carrying
# the full binding graph + DO migrations - then verifies the deploy landed. Recovery cannot live inside
# the thing it recovers; this is the floor that can never be stranded because it is not in aura-core at all.
#
# HOW TO USE (even if aura-core is bricked):
#   GitHub repo -> Actions -> "rollback-to-live" -> Run workflow.
#   Optionally paste a specific commit SHA to roll back to. Blank = the commit before HEAD (last-good).
# Or via API:
#   POST /repos/aaronkaracas-prog/aura-core/actions/workflows/rollback-to-live.yml/dispatches
#   { "ref": "main", "inputs": { "commit": "<sha or blank>" } }

on:
  workflow_dispatch:
    inputs:
      commit:
        description: "Commit SHA to roll back to (blank = the commit before current HEAD)"
        required: false
        default: ""

jobs:
  rollback:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve target commit
        id: target
        run: |
          if [ -n "${{ github.event.inputs.commit }}" ]; then
            TARGET="${{ github.event.inputs.commit }}"
          else
            TARGET=$(git rev-parse HEAD~1)
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Rolling back to: $TARGET"
          git log --oneline -1 "$TARGET"

      - name: Checkout the target commit
        run: |
          git checkout ${{ steps.target.outputs.target }} -- src/index.mjs wrangler.toml package.json package-lock.json
          echo "Checked out target commit's files"

      - name: Syntax gate (never deploy broken code, even on rollback)
        run: node --check src/index.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install toolchain
        run: npm ci

      - name: Deploy the rolled-back version with real wrangler
        run: npx wrangler deploy

      - name: Verify the rollback landed
        run: |
          sleep 10
          TARGET_BUILD=$(grep -m1 'const BUILD' src/index.mjs | grep -oE 'aura-core-v[0-9.]+-[0-9-]+')
          LIVE=$(curl -s https://aura-core-v2.aaronkaracas.workers.dev/health | grep -oE 'aura-core-v[0-9.]+-[0-9-]+' | head -1)
          echo "target_build=$TARGET_BUILD live=$LIVE"
          if [ "$TARGET_BUILD" != "$LIVE" ]; then echo "ROLLBACK MISMATCH - live does not match the rolled-back version"; exit 1; fi
          echo "VERIFIED: rolled back and live, running $LIVE"
