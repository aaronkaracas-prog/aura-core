name: validate-candidate
on:
  push:
    branches: [ aura-proposes ]
jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check the candidate index
        run: node --check src/index.mjs
