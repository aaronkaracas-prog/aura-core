name: deploy-staging
# Deploys main to the STAGING TWIN (aura-core-staging) via the project's own wrangler 4, using the repo's
# PRE-EXISTING secrets CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID - matches promote-to-live.yml exactly,
# but targets wrangler.staging.toml (the isolated twin) instead of live. This is how Aura pushes a candidate
# to her twin to TEST it before promoting the proven change to live.
on:
  workflow_dispatch: {}
jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax gate (never deploy broken code)
        run: node --check src/index.mjs
      - name: Install project toolchain (wrangler 4 from package.json)
        run: npm ci
      - name: Deploy to the staging twin
        run: npx wrangler deploy --config wrangler.staging.toml
      - name: Verify staging build matches main
        run: |
          sleep 10
          MAIN=$(grep -m1 'const BUILD' src/index.mjs | grep -oE 'aura-core-v[0-9.]+-[0-9-]+')
          STG=$(curl -s https://aura-core-staging.aaronkaracas.workers.dev/health | grep -oE 'aura-core-v[0-9.]+-[0-9-]+' | head -1)
          echo "main=$MAIN staging=$STG"
          if [ "$MAIN" != "$STG" ]; then echo "BUILD MISMATCH"; exit 1; fi
          echo "VERIFIED: staging matches main"
