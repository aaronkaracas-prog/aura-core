name: deploy-staging
# Deploys the PROPOSAL branch (aura-proposes) to the STAGING TWIN (aura-core-staging). This is the correct
# self-edit flow: Aura's candidate edit lives on aura-proposes (never main until proven). Staging deploys
# THAT branch so the twin runs her ACTUAL candidate edit for testing. Only after it proves good on the twin
# does AURA_PROMOTE merge aura-proposes into main and deploy to live. Main is always last-known-good.
on:
  workflow_dispatch: {}
jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout the proposal branch (Aura's candidate)
        uses: actions/checkout@v4
        with:
          ref: aura-proposes
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax gate (never deploy broken code)
        run: node --check src/index.mjs
      - name: Install project toolchain (wrangler 4 from package.json)
        run: npm ci
      - name: Deploy the candidate to the staging twin
        run: npx wrangler deploy --config wrangler.staging.toml
      - name: Verify staging build matches the proposal branch
        run: |
          sleep 10
          CAND=$(grep -m1 'const BUILD' src/index.mjs | grep -oE 'aura-core-v[0-9.]+-[0-9-]+')
          STG=$(curl -s https://aura-core-staging.aaronkaracas.workers.dev/health | grep -oE 'aura-core-v[0-9.]+-[0-9-]+' | head -1)
          echo "candidate=$CAND staging=$STG"
          if [ "$CAND" != "$STG" ]; then echo "BUILD MISMATCH"; exit 1; fi
          echo "VERIFIED: staging runs the candidate"
