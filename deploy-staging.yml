name: deploy-staging
# Deploys the current main (or the proposal branch) to the STAGING TWIN (aura-core-staging).
# Aura fires this to push a candidate edit to her isolated twin, where she can test it before promoting to live.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch or ref to deploy to staging"
        required: false
        default: "main"
jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy to staging twin
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler.staging.toml
