name: promote-to-live
# Deploys main to the LIVE production worker (aura-core-v2) via real wrangler - carries the full binding
# graph (KV, D1, Vectorize, AI, service bindings, Durable Objects WITH migrations, cron). This is the
# final promotion, fired only for a change already tested on the staging twin.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch or ref to deploy to live"
        required: false
        default: "main"
jobs:
  promote-to-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy to live
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --config wrangler.toml
