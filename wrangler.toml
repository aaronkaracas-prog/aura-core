name = "aura-core-v2"
main = "src/index.mjs"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ── PRODUCTION (top level = the live worker, deployed with `wrangler deploy`) ──

[[kv_namespaces]]
binding = "AURA_KV"
id = "9c2ba111589e48c6ba5ad1b924ae8809"

[[d1_databases]]
binding = "AURA_MEMORY"
database_name = "aura-memory"
database_id = "5c0a0120-1a34-486a-99df-e73e4d564f7d"

[[vectorize]]
binding = "VECTORIZE"
index_name = "aura-vectors"

[ai]
binding = "AI"

[triggers]
crons = ["*/1 * * * *"]

[[services]]
binding = "AURA_OPS"
service = "aura-ops"

[[services]]
binding = "AURA_HOST"
service = "aura-host"

[[services]]
binding = "AURA_COMMS"
service = "aura-comms"

# ADDED 2026-07-21. aura-core's /chat proxies conversational turns to the Think agent so there is ONE
# brain and one conversation memory instead of two Auras. Without this binding the proxy had to reach
# aura-think by its public workers.dev URL, and Cloudflare refused it with error 1042 - a Worker calling
# another Worker on the same account over the public internet. A service binding keeps the call inside
# Cloudflare: internal, faster, and free. aura-think already had the reverse binding (env.AURA_CORE);
# this completes the pair.
[[services]]
binding = "AURA_THINK"
service = "aura-think"

[[durable_objects.bindings]]
name = "ENTITY_DO"
class_name = "EntityDO"

[[durable_objects.bindings]]
name = "AIS_COLLECTOR"
class_name = "AisCollectorDO"

# ADDED 2026-07-24. The meter's single authoritative writer, one instance per day.
# The egress ledger lived in a KV key written on every provider call - and Cloudflare's own docs are
# explicit that a KV key can be written at most once per second, with anything beyond that erroring
# out. A council round makes 16 provider calls in one turn, so the meter was silently dropping rows
# under exactly the load where the numbers matter.
# Their guidance names this case: "Use Durable Objects when you need a single authoritative point of
# consistency per key, for example a chat room, a stock counter or an exact rate limiter." A meter is
# a stock counter. One DO per DAY rather than one for everything, per their rule against putting all
# data in a single object - a day's writes serialise in one place, and days never contend.
[[durable_objects.bindings]]
name = "LEDGER_DO"
class_name = "LedgerDO"

[[migrations]]
tag = "v1-entitydo"
new_sqlite_classes = ["EntityDO"]

[[migrations]]
tag = "v2-ais-collector"
new_classes = ["AisCollectorDO"]

# SQLite-backed, not the legacy KV backend - the ledger aggregates with SUM() and GROUP BY, which is
# the whole reason it stops being O(rows) to read a day.
[[migrations]]
tag = "v3-ledger-do"
new_sqlite_classes = ["LedgerDO"]

[[send_email]]
name = "SEND_EMAIL"

[browser]
binding = "BROWSER"

# ── STAGING TWIN (deployed with `wrangler deploy --env staging`) ──
# The standard Cloudflare way: one config, an [env.staging] section that overrides ONLY what differs.
# Isolated data (its own KV/D1/Vectorize), no cron, no email. Everything else inherits.

[env.staging]
name = "aura-core-staging"

[env.staging.vars]
WORKER_ENV = "staging"

[[env.staging.kv_namespaces]]
binding = "AURA_KV"
id = "3f137b80965f45a48df36d90a6e89d2b"

[[env.staging.d1_databases]]
binding = "AURA_MEMORY"
database_name = "aura-memory-staging"
database_id = "dcffa0f0-5aa2-4dab-992b-96ce2b16984b"

[[env.staging.vectorize]]
binding = "VECTORIZE"
index_name = "aura-vectors-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.services]]
binding = "AURA_OPS"
service = "aura-ops"

[[env.staging.services]]
binding = "AURA_HOST"
service = "aura-host"

[[env.staging.services]]
binding = "AURA_COMMS"
service = "aura-comms"

# Staging gets the same binding so a self-edit tested on the twin exercises the real proxy path rather
# than silently falling back to the local brain - otherwise the twin would prove something the live
# worker does not do.
[[env.staging.services]]
binding = "AURA_THINK"
service = "aura-think"

[[env.staging.durable_objects.bindings]]
name = "ENTITY_DO"
class_name = "EntityDO"

[[env.staging.durable_objects.bindings]]
name = "AIS_COLLECTOR"
class_name = "AisCollectorDO"

# The twin gets the ledger too, so a meter change can be proven on staging before it touches the
# live count. Same class, its own isolated instances.
[[env.staging.durable_objects.bindings]]
name = "LEDGER_DO"
class_name = "LedgerDO"

[env.staging.browser]
binding = "BROWSER"
